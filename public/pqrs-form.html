<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Formulario PQRS</title>
    <style>
      :root {
        color-scheme: dark;
        --bg:
          radial-gradient(circle at top left, rgba(87, 214, 111, 0.18), transparent 24%),
          radial-gradient(circle at bottom right, rgba(246, 196, 83, 0.14), transparent 20%),
          linear-gradient(180deg, #121715 0%, #0d0f0f 100%);
        --panel-bg: rgba(24, 29, 27, 0.92);
        --field-bg: #111615;
        --border-color: rgba(255, 255, 255, 0.09);
        --text-main: #eef3ef;
        --text-dim: #9ba6a0;
        --green-300: #57d66f;
        --green-500: #2e7d32;
        --green-700: #1b5e20;
        --success-bg: rgba(27, 94, 32, 0.16);
        --success-border: rgba(67, 160, 71, 0.34);
        --shadow: 0 24px 60px rgba(0, 0, 0, 0.22);
      }

      :root[data-theme="light"] {
        color-scheme: light;
        --bg:
          radial-gradient(circle at top left, rgba(87, 214, 111, 0.12), transparent 24%),
          radial-gradient(circle at bottom right, rgba(246, 196, 83, 0.1), transparent 20%),
          linear-gradient(180deg, #f4f8f4 0%, #e5ede6 100%);
        --panel-bg: rgba(255, 255, 255, 0.88);
        --field-bg: #fcfffc;
        --border-color: rgba(23, 33, 28, 0.12);
        --text-main: #172019;
        --text-dim: #5d6a62;
        --green-300: #269947;
        --green-500: #2e7d32;
        --green-700: #215f26;
        --success-bg: rgba(33, 95, 38, 0.08);
        --success-border: rgba(33, 95, 38, 0.2);
        --shadow: 0 20px 48px rgba(20, 33, 25, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Segoe UI", Inter, "Helvetica Neue", Arial, sans-serif;
        color: var(--text-main);
        background: var(--bg);
      }

      .page {
        width: min(880px, calc(100% - 2rem));
        margin: 2rem auto;
      }

      .card {
        border: 1px solid var(--border-color);
        border-radius: 1.5rem;
        background: var(--panel-bg);
        backdrop-filter: blur(16px);
        box-shadow: var(--shadow);
      }

      .header {
        padding: 1.8rem 1.8rem 1.2rem;
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.45rem 0.85rem;
        border-radius: 999px;
        background: rgba(87, 214, 111, 0.08);
        border: 1px solid rgba(87, 214, 111, 0.24);
        color: var(--green-300);
        font-size: 0.8rem;
        font-weight: 700;
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }

      h1 {
        margin: 1rem 0 0.45rem;
        font-size: clamp(2rem, 5vw, 3rem);
        line-height: 1;
      }

      .subtitle {
        margin: 0;
        color: var(--text-dim);
        font-size: 1rem;
      }

      form {
        padding: 0 1.8rem 1.8rem;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 1rem;
      }

      .field {
        display: grid;
        gap: 0.55rem;
      }

      .field.full {
        grid-column: 1 / -1;
      }

      label {
        font-weight: 600;
      }

      input,
      select,
      textarea {
        width: 100%;
        border: 1px solid var(--border-color);
        border-radius: 1rem;
        background: var(--field-bg);
        color: var(--text-main);
        padding: 0.9rem 1rem;
        font: inherit;
        outline: none;
        transition: border-color 180ms ease, box-shadow 180ms ease;
      }

      input:focus,
      select:focus,
      textarea:focus {
        border-color: rgba(87, 214, 111, 0.65);
        box-shadow: 0 0 0 4px rgba(87, 214, 111, 0.12);
      }

      textarea {
        min-height: 160px;
        resize: vertical;
      }

      .help {
        color: var(--text-dim);
        font-size: 0.9rem;
      }

      .actions {
        display: flex;
        justify-content: flex-end;
        gap: 0.8rem;
        margin-top: 1.35rem;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.65rem;
        border: 1px solid var(--border-color);
        border-radius: 1rem;
        padding: 0.9rem 1.2rem;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
        text-decoration: none;
      }

      .button.primary {
        border-color: transparent;
        background: linear-gradient(135deg, var(--green-700), var(--green-500));
        color: #fff;
      }

      .button.secondary {
        background: rgba(255, 255, 255, 0.04);
        color: var(--text-main);
      }

      .status {
        display: none;
        margin: 0 1.8rem 1.4rem;
        padding: 1rem 1.1rem;
        border-radius: 1rem;
        border: 1px solid var(--success-border);
        background: var(--success-bg);
      }

      .status.visible {
        display: block;
      }

      .status strong,
      .status span {
        display: block;
      }

      .status span {
        margin-top: 0.25rem;
        color: var(--text-dim);
      }

      .footer-note {
        margin: 1rem 1.8rem 0;
        padding-top: 1rem;
        border-top: 1px solid var(--border-color);
        color: var(--text-dim);
        font-size: 0.9rem;
      }

      @media (max-width: 720px) {
        .page {
          width: min(100%, calc(100% - 1rem));
          margin: 0.5rem auto;
        }

        .header,
        form {
          padding-inline: 1rem;
        }

        .status,
        .footer-note {
          margin-inline: 1rem;
        }

        .grid {
          grid-template-columns: 1fr;
        }

        .actions {
          flex-direction: column;
        }

        .button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="card">
        <header class="header">
          <span class="eyebrow">PQRS</span>
          <h1>Formulario de Solicitud</h1>
          <p class="subtitle">Radica peticiones, quejas, reclamos, sugerencias o felicitaciones.</p>
        </header>

        <div id="status" class="status" aria-live="polite"></div>

        <form id="pqrs-form">
          <div class="grid">
            <div class="field">
              <label for="fullName">Nombre completo</label>
              <input id="fullName" name="fullName" type="text" required />
            </div>

            <div class="field">
              <label for="document">Documento</label>
              <input id="document" name="document" type="text" inputmode="numeric" required />
            </div>

            <div class="field">
              <label for="email">Correo electrónico</label>
              <input id="email" name="email" type="email" required />
            </div>

            <div class="field">
              <label for="phone">Teléfono</label>
              <input id="phone" name="phone" type="tel" />
            </div>

            <div class="field">
              <label for="requestType">Tipo</label>
              <select id="requestType" name="requestType" required>
                <option value="">Seleccione una opción</option>
                <option value="Petición">Petición</option>
                <option value="Queja">Queja</option>
                <option value="Reclamo">Reclamo</option>
                <option value="Sugerencia">Sugerencia</option>
                <option value="Felicitación">Felicitación</option>
              </select>
            </div>

            <div class="field">
              <label for="preferredResponse">Medio de respuesta</label>
              <select id="preferredResponse" name="preferredResponse" required>
                <option value="">Seleccione una opción</option>
                <option value="Correo electrónico">Correo electrónico</option>
                <option value="Teléfono">Teléfono</option>
                <option value="WhatsApp">WhatsApp</option>
              </select>
            </div>

            <div class="field full">
              <label for="subject">Asunto</label>
              <input id="subject" name="subject" type="text" required />
            </div>

            <div class="field full">
              <label for="message">Descripción</label>
              <textarea id="message" name="message" required></textarea>
              <span class="help">Incluye la información necesaria para identificar el caso.</span>
            </div>
          </div>

          <div class="actions">
            <button class="button secondary" type="reset">Limpiar</button>
            <button class="button primary" type="submit">Radicar PQRS</button>
          </div>
        </form>

        <div class="footer-note">
          ECA Zipaquirá
        </div>
      </section>
    </main>

    <script>
      (function () {
        const themeKey = "eca-management-theme";
        const pqrsKey = "eca-management-pqrs";
        const form = document.getElementById("pqrs-form");
        const status = document.getElementById("status");
        const storedTheme = localStorage.getItem(themeKey);

        if (storedTheme === "light") {
          document.documentElement.dataset.theme = "light";
          document.documentElement.style.colorScheme = "light";
        } else {
          document.documentElement.dataset.theme = "dark";
          document.documentElement.style.colorScheme = "dark";
        }

        form.addEventListener("submit", function (event) {
          event.preventDefault();

          const formData = new FormData(form);
          const radicado = "PQRS-" + Date.now();
          const payload = {
            id: radicado,
            createdAt: new Date().toISOString(),
            fullName: String(formData.get("fullName") || ""),
            document: String(formData.get("document") || ""),
            email: String(formData.get("email") || ""),
            phone: String(formData.get("phone") || ""),
            requestType: String(formData.get("requestType") || ""),
            preferredResponse: String(formData.get("preferredResponse") || ""),
            subject: String(formData.get("subject") || ""),
            message: String(formData.get("message") || ""),
          };

          const current = JSON.parse(localStorage.getItem(pqrsKey) || "[]");
          current.unshift(payload);
          localStorage.setItem(pqrsKey, JSON.stringify(current));

          status.className = "status visible";
          status.innerHTML =
            "<strong>Solicitud registrada</strong><span>Radicado: " +
            radicado +
            "</span>";

          form.reset();
          window.scrollTo({ top: 0, behavior: "smooth" });
        });
      })();
    </script>
  </body>
</html>
